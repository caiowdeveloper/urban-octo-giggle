<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limobi | Acesso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4efe7;
            --paper: rgba(255, 251, 245, 0.78);
            --paper-strong: #fffaf3;
            --line: rgba(46, 61, 52, 0.12);
            --text: #19231d;
            --muted: #667169;
            --accent: #1f6b52;
            --accent-strong: #134b39;
            --accent-soft: #deeadf;
            --danger: #a54c3f;
            --danger-bg: #fbe8e3;
            --success: #216448;
            --success-bg: #e7f4eb;
            --shadow: 0 28px 80px rgba(25, 35, 29, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Sora", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 20%, rgba(215, 232, 220, 0.95) 0, transparent 28%),
                radial-gradient(circle at 82% 16%, rgba(255, 222, 198, 0.72) 0, transparent 24%),
                linear-gradient(140deg, #f8f4ed 0%, #efe8dd 52%, #e7efe7 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(25, 35, 29, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(25, 35, 29, 0.03) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 92%);
            pointer-events: none;
        }

        .page {
            position: relative;
            min-height: 100vh;
            padding: 28px;
            display: grid;
            place-items: center;
        }

        .orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(14px);
            opacity: 0.88;
            pointer-events: none;
        }

        .orb-a {
            width: 220px;
            height: 220px;
            top: 72px;
            left: 5%;
            background: rgba(214, 232, 211, 0.86);
        }

        .orb-b {
            width: 160px;
            height: 160px;
            right: 7%;
            bottom: 76px;
            background: rgba(255, 211, 173, 0.7);
        }

        .shell {
            position: relative;
            width: min(1080px, 100%);
            display: grid;
            grid-template-columns: minmax(280px, 0.86fr) minmax(360px, 1fr);
            gap: 22px;
            z-index: 1;
        }

        .hero,
        .auth {
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 32px;
            background: var(--paper);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }

        .hero {
            padding: 36px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 620px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0.2)),
                linear-gradient(160deg, rgba(255, 251, 245, 0.94), rgba(233, 242, 235, 0.92));
        }

        .brand-mark {
            width: 58px;
            height: 58px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent) 0%, #3d9977 100%);
            color: #f9f6f0;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            box-shadow: 0 18px 32px rgba(31, 107, 82, 0.22);
        }

        .brand-block {
            display: grid;
            gap: 18px;
        }

        .brand-name {
            margin: 0;
            font-family: "Instrument Serif", serif;
            font-size: clamp(3.5rem, 9vw, 5.6rem);
            line-height: 0.88;
            letter-spacing: -0.04em;
        }

        .brand-copy {
            margin: 0;
            max-width: 18ch;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.75;
        }

        .pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pill {
            padding: 12px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.7);
            color: var(--text);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .hero-footer {
            display: grid;
            gap: 10px;
            padding-top: 24px;
        }

        .hero-kicker {
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .hero-minimal {
            margin: 0;
            max-width: 22ch;
            font-family: "Instrument Serif", serif;
            font-size: clamp(1.9rem, 4vw, 2.6rem);
            line-height: 0.98;
        }

        .auth {
            padding: 32px;
        }

        .auth-head {
            display: grid;
            gap: 8px;
        }

        .eyebrow {
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .auth-head h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1.02;
            letter-spacing: -0.04em;
        }

        .auth-head p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 24px;
        }

        .tab {
            border: 1px solid transparent;
            border-radius: 22px;
            padding: 14px 12px;
            background: rgba(255, 255, 255, 0.55);
            color: var(--muted);
            font: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, color 180ms ease;
        }

        .tab:hover {
            transform: translateY(-1px);
        }

        .tab.active {
            background: var(--paper-strong);
            border-color: rgba(31, 107, 82, 0.15);
            color: var(--text);
            box-shadow: 0 14px 32px rgba(25, 35, 29, 0.08);
        }

        .feedback {
            display: none;
            margin-top: 18px;
            padding: 15px 16px;
            border-radius: 18px;
            font-size: 0.94rem;
            line-height: 1.6;
        }

        .feedback.visible {
            display: block;
        }

        .feedback.success {
            background: var(--success-bg);
            color: var(--success);
        }

        .feedback.error {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .panel {
            display: none;
            margin-top: 22px;
            padding: 24px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.72);
        }

        .panel.active {
            display: block;
        }

        .form-copy {
            margin: 0 0 18px;
            color: var(--muted);
            line-height: 1.65;
        }

        form {
            display: grid;
            gap: 14px;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .field {
            display: grid;
            gap: 7px;
        }

        label {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 15px 16px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 251, 245, 0.92);
            color: var(--text);
            font: inherit;
        }

        input::placeholder {
            color: #8f9891;
        }

        input:focus {
            outline: none;
            border-color: rgba(31, 107, 82, 0.42);
            box-shadow: 0 0 0 4px rgba(31, 107, 82, 0.1);
        }

        .helper {
            width: fit-content;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .helper:hover {
            text-decoration: underline;
        }

        .submit {
            margin-top: 4px;
            border: 0;
            border-radius: 20px;
            padding: 16px 20px;
            background: linear-gradient(135deg, var(--accent-strong) 0%, var(--accent) 46%, #3a8f70 100%);
            color: #fff9f2;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 18px 32px rgba(31, 107, 82, 0.24);
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        .submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 36px rgba(31, 107, 82, 0.28);
        }

        @media (max-width: 980px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .hero {
                min-height: auto;
                gap: 48px;
            }
        }

        @media (max-width: 720px) {
            .page {
                padding: 16px;
            }

            .hero,
            .auth {
                padding: 22px;
                border-radius: 26px;
            }

            .tabs,
            .field-row {
                grid-template-columns: 1fr;
            }

            .panel {
                padding: 18px;
            }

            .brand-name {
                font-size: 3.3rem;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="orb orb-a" aria-hidden="true"></div>
        <div class="orb orb-b" aria-hidden="true"></div>

        <div class="shell">
            <section class="hero" aria-label="Apresentacao da Limobi">
                <div class="brand-block">
                    <div class="brand-mark" aria-hidden="true">LM</div>
                    <h1 class="brand-name">Limobi</h1>
                    <p class="brand-copy">SaaS com acesso simples, moderno e direto ao ponto.</p>
                </div>

            </section>

            <section class="auth">
                <header class="auth-head">
                    <span class="eyebrow">Conta Limobi</span>
                    <h1 id="title">Entrar</h1>
                    <p id="description">Acesse sua conta com e-mail ou usuario.</p>
                </header>

                <div class="tabs" role="tablist" aria-label="Fluxos de acesso">
                    <button class="tab active" type="button" data-mode="login" aria-selected="true">Login</button>
                    <button class="tab" type="button" data-mode="register" aria-selected="false">Cadastro</button>
                    <button class="tab" type="button" data-mode="forgot" aria-selected="false">Recuperar</button>
                </div>

                <div class="feedback" id="feedback" role="status" aria-live="polite"></div>

                <section class="panel active" data-panel="login">
                    <p class="form-copy">Entre para continuar no Limobi.</p>

                    <form data-form="login">
                        <div class="field">
                            <label for="login-identificador">E-mail ou usuario</label>
                            <input id="login-identificador" name="login" type="text" placeholder="voce@limobi.com" required>
                        </div>

                        <div class="field">
                            <label for="login-senha">Senha</label>
                            <input id="login-senha" name="senha" type="password" placeholder="Digite sua senha" required>
                        </div>

                        <a class="helper" href="#" data-switch="forgot">Esqueci minha senha</a>

                        <button class="submit" type="submit">Entrar</button>
                    </form>
                </section>

                <section class="panel" data-panel="register">
                    <p class="form-copy">Crie sua conta com os dados essenciais.</p>

                    <form data-form="register">
                        <div class="field">
                            <label for="cadastro-nome">Nome</label>
                            <input id="cadastro-nome" name="nome" type="text" placeholder="Seu nome completo" required>
                        </div>

                        <div class="field-row">
                            <div class="field">
                                <label for="cadastro-email">E-mail</label>
                                <input id="cadastro-email" name="email" type="email" placeholder="voce@empresa.com" required>
                            </div>

                            <div class="field">
                                <label for="cadastro-telefone">Telefone</label>
                                <input id="cadastro-telefone" name="telefone" type="text" placeholder="(11) 99999-9999" required>
                            </div>
                        </div>

                        <div class="field-row">
                            <div class="field">
                                <label for="cadastro-senha">Senha</label>
                                <input id="cadastro-senha" name="senha" type="password" placeholder="Minimo 8 caracteres" required>
                            </div>

                            <div class="field">
                                <label for="cadastro-confirmar">Confirmar senha</label>
                                <input id="cadastro-confirmar" name="confirmarSenha" type="password" placeholder="Repita sua senha" required>
                            </div>
                        </div>

                        <button class="submit" type="submit">Criar conta</button>
                    </form>
                </section>

                <section class="panel" data-panel="forgot">
                    <p class="form-copy">Informe seu e-mail ou usuario para recuperar a conta.</p>

                    <form data-form="forgot">
                        <div class="field">
                            <label for="forgot-identificador">E-mail ou usuario</label>
                            <input id="forgot-identificador" name="login" type="text" placeholder="voce@limobi.com" required>
                        </div>

                        <button class="submit" type="submit">Recuperar acesso</button>
                    </form>
                </section>
            </section>
        </div>
    </main>

    <script>
        const textByMode = {
            login: {
                title: "Entrar",
                description: "Acesse sua conta com e-mail ou usuario."
            },
            register: {
                title: "Cadastro",
                description: "Crie uma nova conta Limobi."
            },
            forgot: {
                title: "Recuperar conta",
                description: "Receba as instrucoes para voltar ao sistema."
            }
        };

        const futureEndpoints = window.LIMOBI_API_ENDPOINTS || null;
        const tabs = document.querySelectorAll(".tab");
        const panels = document.querySelectorAll(".panel");
        const switchLinks = document.querySelectorAll("[data-switch]");
        const forms = document.querySelectorAll("form[data-form]");
        const title = document.getElementById("title");
        const description = document.getElementById("description");
        const feedback = document.getElementById("feedback");

        function showFeedback(type, message) {
            feedback.className = "feedback visible " + type;
            feedback.textContent = message;
        }

        function clearFeedback() {
            feedback.className = "feedback";
            feedback.textContent = "";
        }

        function setMode(mode) {
            tabs.forEach((tab) => {
                const active = tab.dataset.mode === mode;
                tab.classList.toggle("active", active);
                tab.setAttribute("aria-selected", active ? "true" : "false");
            });

            panels.forEach((panel) => {
                panel.classList.toggle("active", panel.dataset.panel === mode);
            });

            title.textContent = textByMode[mode].title;
            description.textContent = textByMode[mode].description;
            clearFeedback();
        }

        tabs.forEach((tab) => {
            tab.addEventListener("click", () => setMode(tab.dataset.mode));
        });

        switchLinks.forEach((link) => {
            link.addEventListener("click", (event) => {
                event.preventDefault();
                setMode(link.dataset.switch);
            });
        });

        forms.forEach((form) => {
            form.addEventListener("submit", (event) => {
                event.preventDefault();

                const mode = form.dataset.form;

                if (mode === "register") {
                    const senha = form.querySelector('[name="senha"]').value;
                    const confirmar = form.querySelector('[name="confirmarSenha"]').value;

                    if (senha !== confirmar) {
                        showFeedback("error", "As senhas nao conferem.");
                        return;
                    }
                }

                if (futureEndpoints && futureEndpoints[mode]) {
                    showFeedback("success", "Endpoint configurado: " + futureEndpoints[mode]);
                    return;
                }

                if (mode === "login") {
                    showFeedback("success", "Tela pronta para conectar o endpoint de login.");
                    return;
                }

                if (mode === "register") {
                    showFeedback("success", "Tela pronta para conectar o endpoint de cadastro.");
                    return;
                }

                showFeedback("success", "Tela pronta para conectar o endpoint de recuperacao.");
            });
        });
    </script>
</body>
</html>
